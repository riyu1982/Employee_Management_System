<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Ordering System</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
}

.container{
    width: 700px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

h2{
    text-align: center;
}

table{
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td{
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

th{
    background-color: #1E90FF;
    color: black;
}

input[type="number"]{
    width: 60px;
    padding: 5px;
}

button{
    background-color: #1E90FF;
    color: white;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
    border-radius: 5px;
    margin-top: 15px;
}

.bill{
    margin-top: 20px;
}
</style>
</head>
<body>

<div class="container">

    <h2>🍔Food Ordering System</h2>

    <table>
        <tr>
            <th>Select</th>
            <th>Item</th>
            <th>Price (₹)</th>
            <th>Quantity</th>
        </tr>

        <tr>
            <td><input type="checkbox" id="pizza"></td>
            <td>Pizza</td>
            <td>250</td>
            <td><input type="number" id="pizzaQty" min="1" value="1"></td>
        </tr>

        <tr>
            <td><input type="checkbox" id="burger"></td>
            <td>Burger</td>
            <td>120</td>
            <td><input type="number" id="burgerQty" min="1" value="1"></td>
        </tr>

        <tr>
            <td><input type="checkbox" id="sandwich"></td>
            <td>Sandwich</td>
            <td>100</td>
            <td><input type="number" id="sandwichQty" min="1" value="1"></td>
        </tr>

        <tr>
            <td><input type="checkbox" id="pasta"></td>
            <td>Pasta</td>
            <td>180</td>
            <td><input type="number" id="pastaQty" min="1" value="1"></td>
        </tr>

        <tr>
            <td><input type="checkbox" id="colddrink"></td>
            <td>Cold Drink</td>
            <td>50</td>
            <td><input type="number" id="colddrinkQty" min="1" value="1"></td>
        </tr>

        <tr>
            <td><input type="checkbox" id="coffee"></td>
            <td>Coffee</td>
            <td>80</td>
            <td><input type="number" id="coffeeQty" min="1" value="1"></td>
        </tr>
    </table>

    <button onclick="placeOrder()">Order</button>

    <div class="bill" id="bill"></div>

</div>

<script>

function placeOrder(){

    const menu = [
        {id:"pizza", name:"Pizza", price:250},
        {id:"burger", name:"Burger", price:120},
        {id:"sandwich", name:"Sandwich", price:100},
        {id:"pasta", name:"Pasta", price:180},
        {id:"colddrink", name:"Cold Drink", price:50},
        {id:"coffee", name:"Coffee", price:80}
    ];

    let output = `
    <h3>Order Summary</h3>

    <table>
    <tr>
        <th>Item</th>
        <th>Qty</th>
        <th>Price</th>
        <th>Total</th>
    </tr>`;

    let grandTotal = 0;
    let selected = false;

    menu.forEach(item => {

        if(document.getElementById(item.id).checked){

            selected = true;

            let qty =
            parseInt(document.getElementById(item.id + "Qty").value);

            let total = qty * item.price;

            grandTotal += total;

            output += `
            <tr>
                <td>${item.name}</td>
                <td>${qty}</td>
                <td>₹${item.price}</td>
                <td>₹${total}</td>
            </tr>`;
        }
    });

    output += `
    </table>
    <h3>Total Bill: ₹${grandTotal}</h3>`;

    if(!selected){
        output = "<h3>Please select at least one item.</h3>";
    }

    document.getElementById("bill").innerHTML = output;
}

</script>

</body>
</html>
